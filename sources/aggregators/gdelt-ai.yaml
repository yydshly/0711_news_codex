id: gdelt-ai
name: GDELT AI Discovery
status: candidate
nature: aggregator
roles: [discovery]
language: en
topics: [foundation_models, agents, developer_tools]
authority_score: 2
poll_interval_minutes: 60
access_methods:
  - kind: public_api
    url: https://api.gdeltproject.org/api/v2/doc/doc
    priority: 1
    params: {query: artificial intelligence, mode: artlist, maxrecords: '5', format: json}
expected_fields: [title, canonical_url, published_at]
risk: {terms: 2, authentication: 0, stability: 3, data_quality: 5, operating_cost: 1, evidence: [https://docs.gdeltcloud.com/api-reference/v2]}
notes: Discovery only; every item must be resolved to its original publisher before use as evidence.

